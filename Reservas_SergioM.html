<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Restaurante Los Jamones</title>
    <link rel="stylesheet" href="style_SergioM.css">
</head>
<body>
    <header>
        <h1>Reservas - Restaurante Los Jamones</h1>
    </header>
    <main>
        <section>
            <h2>Formulario de Reservas</h2>
            <form action="http://127.0.0.1:5500/Reservas_SergioM.html" method="post">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="date">Fecha:</label>
                <input type="date" id="date" name="date" required>

                <label for="time">Hora:</label>
                <input type="time" id="time" name="time" required>

                <label for="people">Número de personas:</label>
                <input type="number" id="people" name="people" required>

                <input type="submit" value="Reservar">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Restaurante Los Jamones</p>
    </footer>
</body>
</html>
